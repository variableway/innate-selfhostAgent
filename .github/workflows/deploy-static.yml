name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: playground
        run: pnpm install

      - name: Generate skills manifest
        working-directory: playground/apps/desktop
        run: node scripts/generate-skills-manifest.mjs

      - name: Build static site
        working-directory: playground/apps/desktop
        env:
          NEXT_BASE_PATH: /innate-executable
          NEXT_PUBLIC_BASE_PATH: /innate-executable
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/apps/desktop/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
