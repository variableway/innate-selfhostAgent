      <rect x="234" y="516" width="124" height="42" rx="21" fill="#FFFFFF" />
      <text x="266" y="543" fill="#171717">Coding</text>
      <rect x="78" y="574" width="166" height="42" rx="21" fill="#FFFFFF" />
