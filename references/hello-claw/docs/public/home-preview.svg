    <g font-family="'SFMono-Regular', Menlo, Consolas, monospace" font-size="18" font-weight="500">
      <text x="552" y="500" fill="#7FD1FF">1</text>
      <text x="590" y="500" fill="#F7F4F1">Understand the architecture</text>
      <text x="552" y="540" fill="#7FD1FF">2</text>
      <text x="590" y="540" fill="#F7F4F1">Customize prompts and skills</text>
