  </defs>

  <rect width="980" height="760" rx="34" fill="url(#surface)" />
  <rect x="30" y="30" width="920" height="700" rx="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" />

  <g opacity="0.9">
